# Release pipeline — builds and publishes every platform's package on a version
# tag. Modelled on the pb-mapper project's release workflows, adapted for
# Pocket-Codex: the Flutter app's Rust FFI is built inline by cargokit
# (flutter_rust_bridge), so `flutter build <platform>` compiles the native
# library automatically — no separate make/FFI step or hash check is needed.
#
# Push a tag like `v1.2.3` (or run manually — a manual run produces a DRAFT
# release so nothing goes public by accident). Each job creates-or-updates the
# release for the tag and attaches its assets; the first job to run generates
# the release notes from the commits since the previous tag.
#
# Artifacts attached:
#   - `pocket-codex` CLI for desktop OSes (Linux / macOS x64+arm64 / Windows)
#   - the Flutter app for Windows / Linux / Android / macOS / iOS
name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: write

env:
  # Keep in sync with apps/flutter/.fvmrc, pubspec `environment.flutter`, and ci.yml.
  FLUTTER_VERSION: "3.44.0"
  # Match rust-toolchain.toml so cargokit/cargo build with the pinned toolchain
  # (the code is stable-compatible; this just avoids a surprise auto-download).
  RUST_TOOLCHAIN: nightly-2026-04-01
  RELEASE_NAME: Pocket-Codex ${{ github.ref_name }}
  IS_DRAFT: ${{ github.event_name == 'workflow_dispatch' }}

jobs:
  # --- Rust CLI (`pocket-codex`) — desktop platforms --------------------------
  cli:
    name: CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}

      - name: Build pocket-codex CLI
        run: cargo build --release --locked --bin pocket-codex --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          # Sanitise the ref name so a manual run on a branch (with slashes)
          # still yields a valid filename.
          tag="${GITHUB_REF_NAME//\//-}"
          name="pocket-codex-${tag}-${{ matrix.target }}"
          mkdir -p "dist/$name"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/pocket-codex.exe" "dist/$name/"
            (cd dist && 7z a "$name.zip" "$name" >/dev/null)
          else
            cp "target/${{ matrix.target }}/release/pocket-codex" "dist/$name/"
            tar -czf "dist/$name.tar.gz" -C dist "$name"
          fi
          rm -rf "dist/$name"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.RELEASE_NAME }}
          draft: ${{ env.IS_DRAFT }}
          generate_release_notes: true
          files: dist/*

  # --- Flutter app: Windows ---------------------------------------------------
  app-windows:
    name: App (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: app-windows
      - name: Build Windows app
        working-directory: apps/flutter
        run: |
          flutter pub get
          flutter build windows --release
      - name: Package
        shell: bash
        working-directory: apps/flutter
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME//\//-}"
          mkdir -p dist
          (cd build/windows/x64/runner/Release && 7z a "$OLDPWD/dist/pocket-codex-${tag}-windows-x64.zip" . >/dev/null)
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.RELEASE_NAME }}
          draft: ${{ env.IS_DRAFT }}
          generate_release_notes: true
          files: apps/flutter/dist/*

  # --- Flutter app: Linux -----------------------------------------------------
  app-linux:
    name: App (Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: app-linux
      - name: Install Linux desktop build deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - name: Build Linux app
        working-directory: apps/flutter
        run: |
          flutter pub get
          flutter build linux --release
      - name: Package
        shell: bash
        working-directory: apps/flutter
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME//\//-}"
          mkdir -p dist
          (cd build/linux/x64/release/bundle && zip -ry "$OLDPWD/dist/pocket-codex-${tag}-linux-x64.zip" .)
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.RELEASE_NAME }}
          draft: ${{ env.IS_DRAFT }}
          generate_release_notes: true
          files: apps/flutter/dist/*

  # --- Flutter app: Android (split per ABI) -----------------------------------
  app-android:
    name: App (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      # cargokit builds the per-ABI .so against the NDK; pin one so the build is
      # reproducible regardless of the runner's default SDK NDK.
      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          link-to-sdk: true
      - uses: Swatinem/rust-cache@v2
        with:
          key: app-android
      - name: Build Android APKs (split per ABI)
        working-directory: apps/flutter
        run: |
          flutter pub get
          flutter build apk --release --split-per-abi
      - name: Package
        shell: bash
        working-directory: apps/flutter
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME//\//-}"
          mkdir -p dist
          src="build/app/outputs/flutter-apk"
          cp "$src/app-arm64-v8a-release.apk"   "dist/pocket-codex-${tag}-android-arm64-v8a.apk"
          cp "$src/app-armeabi-v7a-release.apk" "dist/pocket-codex-${tag}-android-armeabi-v7a.apk"
          cp "$src/app-x86_64-release.apk"      "dist/pocket-codex-${tag}-android-x86_64.apk"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.RELEASE_NAME }}
          draft: ${{ env.IS_DRAFT }}
          generate_release_notes: true
          files: apps/flutter/dist/*

  # --- Flutter app: macOS -----------------------------------------------------
  app-macos:
    name: App (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: app-macos
      - name: Build macOS app
        working-directory: apps/flutter
        run: |
          flutter pub get
          flutter build macos --release
      - name: Package
        shell: bash
        working-directory: apps/flutter
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME//\//-}"
          mkdir -p dist
          (cd build/macos/Build/Products/Release && zip -ry "$OLDPWD/dist/pocket-codex-${tag}-macos.zip" pocket_codex.app)
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.RELEASE_NAME }}
          draft: ${{ env.IS_DRAFT }}
          generate_release_notes: true
          files: apps/flutter/dist/*

  # --- Flutter app: iOS (unsigned, for sideloading / dev) ---------------------
  app-ios:
    name: App (iOS, unsigned)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: app-ios
      - name: Build iOS app (no codesign)
        working-directory: apps/flutter
        run: |
          flutter pub get
          flutter build ios --release --no-codesign
      - name: Package unsigned IPA
        shell: bash
        working-directory: apps/flutter
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME//\//-}"
          mkdir -p dist
          (cd build/ios/iphoneos && mkdir -p Payload && mv Runner.app Payload/ \
            && zip -ry "$OLDPWD/dist/pocket-codex-${tag}-ios-unsigned.ipa" Payload)
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.RELEASE_NAME }}
          draft: ${{ env.IS_DRAFT }}
          generate_release_notes: true
          files: apps/flutter/dist/*
