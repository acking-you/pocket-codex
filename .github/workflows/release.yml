# Release pipeline — builds and publishes every platform's package on a version
# tag. Push a tag like `v1.2.3` (or run manually — a manual run produces a DRAFT
# release so nothing goes public by accident).
#
# Two product families, named so they never collide:
#   - CLI  → `pocket-codex-cli-<tag>-<rust-target>.{tar.gz,zip}`
#            Linux builds are musl + fully static (glibc-independent: run on
#            Alpine, old distros, ARM SBCs) via `cross`.
#   - App  → `pocket-codex-app-<tag>-<platform>.<ext>` with one-click installers
#            (Windows .exe, macOS .dmg, Linux .AppImage + .deb) plus the
#            portable archives, and Android .apk / iOS unsigned .ipa.
#
# Release notes are generated ONCE in the `prepare` job and every other job
# attaches that same body (`body_path:`), so the body is never duplicated.
name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: write

env:
  # Keep in sync with apps/flutter/.fvmrc, pubspec `environment.flutter`, and ci.yml.
  FLUTTER_VERSION: "3.44.0"
  # Match rust-toolchain.toml so cargo/cross build with the pinned toolchain.
  RUST_TOOLCHAIN: nightly-2026-04-01
  RELEASE_NAME: Pocket-Codex ${{ github.ref_name }}
  IS_DRAFT: ${{ github.event_name == 'workflow_dispatch' }}

jobs:
  # --- Release notes, generated exactly once ---------------------------------
  prepare:
    name: Release notes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build release notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          # GitHub's autogenerated changelog — only when a real tag exists
          # (a manual run on a branch has none; the draft just omits it).
          changelog=""
          if [ "${{ github.event_name }}" = "push" ]; then
            changelog="$(gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="${tag}" --jq '.body' 2>/dev/null || true)"
          fi
          {
            echo "## Pocket-Codex ${tag}"
            echo
            echo "Remote-control your codex sessions from any device. This release ships the desktop/mobile **app** and the **CLI**."
            echo
            echo "### Which file do I want?"
            echo
            echo "**App (GUI)** — \`pocket-codex-app-*\`:"
            echo
            echo "| Platform | File |"
            echo "|---|---|"
            echo "| Windows | \`…-windows-x64-setup.exe\` (installer) · \`…-windows-x64.zip\` (portable) |"
            echo "| macOS | \`…-macos.dmg\` |"
            echo "| Linux | \`…-linux-x86_64.AppImage\` (portable) · \`…-linux-amd64.deb\` (Debian/Ubuntu) · \`…-linux-x64.zip\` |"
            echo "| Android | \`…-android-arm64-v8a.apk\` (most phones) · armeabi-v7a · x86_64 |"
            echo "| iOS | \`…-ios-unsigned.ipa\` (sideload / development) |"
            echo
            echo "**CLI** — \`pocket-codex-cli-*\`: statically linked **musl** Linux binaries (x86_64 / aarch64 / armv7 — run on any distro, no glibc dependency), plus macOS (x64 / arm64) and Windows x64."
            echo
            echo "> Android APKs and the iOS IPA are debug-signed / unsigned (no release signing configured yet) — install for sideloading/development."
            if [ -n "${changelog}" ]; then
              echo
              echo "${changelog}"
            fi
          } > release_notes.md
          echo "----- release_notes.md -----"
          cat release_notes.md
      - uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release_notes.md

  # --- CLI (`pocket-codex`) — static musl Linux + native macOS/Windows --------
  cli:
    name: CLI (${{ matrix.target }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Fully static, glibc-independent Linux builds via cross.
          - { target: x86_64-unknown-linux-musl,      os: ubuntu-latest,  cross: true }
          - { target: aarch64-unknown-linux-musl,     os: ubuntu-latest,  cross: true }
          - { target: armv7-unknown-linux-musleabihf, os: ubuntu-latest,  cross: true }
          # Native desktop targets.
          - { target: x86_64-apple-darwin,            os: macos-latest,   cross: false }
          - { target: aarch64-apple-darwin,           os: macos-latest,   cross: false }
          - { target: x86_64-pc-windows-msvc,         os: windows-latest, cross: false }
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: release-notes
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}
      - name: Install cross
        if: ${{ matrix.cross }}
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build pocket-codex CLI
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked --bin pocket-codex --target ${{ matrix.target }}
          else
            cargo build --release --locked --bin pocket-codex --target ${{ matrix.target }}
          fi
      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME//\//-}"
          name="pocket-codex-cli-${tag}-${{ matrix.target }}"
          mkdir -p "dist/$name"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/pocket-codex.exe" "dist/$name/"
            (cd dist && 7z a "$name.zip" "$name" >/dev/null)
          else
            cp "target/${{ matrix.target }}/release/pocket-codex" "dist/$name/"
            tar -czf "dist/$name.tar.gz" -C dist "$name"
          fi
          rm -rf "dist/$name"
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.RELEASE_NAME }}
          draft: ${{ env.IS_DRAFT }}
          body_path: release_notes.md
          files: dist/*

  # --- App: Windows (Inno Setup installer + portable zip) ---------------------
  app-windows:
    name: App (Windows)
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: release-notes
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: app-windows
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      # Desktop bundles Noto Sans SC (fixes thin/uneven Chinese on Windows).
      - name: Activate desktop manifest (bundle Noto Sans SC)
        shell: bash
        working-directory: apps/flutter
        run: cp pubspec-desktop.yaml pubspec.yaml
      - name: Build Windows app
        working-directory: apps/flutter
        run: |
          flutter pub get
          flutter build windows --release
      - name: Package (installer + portable zip)
        shell: pwsh
        working-directory: apps/flutter
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${env:GITHUB_REF_NAME}" -replace "/","-"
          $ver = $tag -replace "^v",""
          $rel = "build/windows/x64/runner/Release"
          New-Item -ItemType Directory -Force dist | Out-Null
          # Portable zip
          Compress-Archive -Path "$rel/*" -DestinationPath "dist/pocket-codex-app-$tag-windows-x64.zip" -Force
          # One-click installer via Inno Setup
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "/DAppVersion=$ver" "/DBuildDir=$((Resolve-Path $rel).Path)" "/DOutDir=$((Resolve-Path dist).Path)" "windows\packaging\pocket-codex.iss"
          Rename-Item "dist/pocket-codex-app-setup.exe" "pocket-codex-app-$tag-windows-x64-setup.exe"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.RELEASE_NAME }}
          draft: ${{ env.IS_DRAFT }}
          body_path: release_notes.md
          files: apps/flutter/dist/*

  # --- App: Linux (AppImage + .deb + portable zip) ----------------------------
  app-linux:
    name: App (Linux)
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: release-notes
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: app-linux
      - name: Install Linux desktop + packaging deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev \
            file desktop-file-utils fakeroot zip
      - name: Activate desktop manifest (bundle Noto Sans SC)
        shell: bash
        working-directory: apps/flutter
        run: cp pubspec-desktop.yaml pubspec.yaml
      - name: Build Linux app
        working-directory: apps/flutter
        run: |
          flutter pub get
          flutter build linux --release
      - name: Package (zip + AppImage + deb)
        shell: bash
        working-directory: apps/flutter
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME//\//-}"
          # dpkg requires the Version field to start with a digit. A real tag
          # yields e.g. 0.0.1; a manual/branch run has a non-numeric ref, so
          # fall back to 0.0.0 there.
          debver="$(printf '%s' "${tag}" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1 || true)"
          [ -n "${debver}" ] || debver="0.0.0"
          bundle="build/linux/x64/release/bundle"
          mkdir -p dist

          # 1) Portable zip
          ( cd "$bundle" && zip -qry "${OLDPWD}/dist/pocket-codex-app-${tag}-linux-x64.zip" . )

          # 2) AppImage
          appdir=AppDir
          rm -rf "$appdir"
          mkdir -p "$appdir/usr/bin" "$appdir/usr/share/applications" \
                   "$appdir/usr/share/icons/hicolor/256x256/apps"
          cp -r "$bundle"/* "$appdir/usr/bin/"
          cp icon/icon_square.png "$appdir/usr/share/icons/hicolor/256x256/apps/pocket-codex.png"
          cp "$appdir/usr/share/icons/hicolor/256x256/apps/pocket-codex.png" "$appdir/pocket-codex.png"
          cat > "$appdir/usr/share/applications/pocket-codex.desktop" <<'DESKTOP'
          [Desktop Entry]
          Name=Pocket-Codex
          Comment=Remote-control codex sessions from any device
          Exec=pocket_codex
          Icon=pocket-codex
          Terminal=false
          Type=Application
          Categories=Development;Utility;
          DESKTOP
          cp "$appdir/usr/share/applications/pocket-codex.desktop" "$appdir/"
          cat > "$appdir/AppRun" <<'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export LD_LIBRARY_PATH="${HERE}/usr/bin/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/pocket_codex" "$@"
          APPRUN
          chmod +x "$appdir/AppRun"
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run \
            "$appdir" "dist/pocket-codex-app-${tag}-linux-x86_64.AppImage"

          # 3) Debian package
          deb=pocket-codex-deb
          rm -rf "$deb"
          mkdir -p "$deb/DEBIAN" "$deb/usr/bin" "$deb/usr/lib/pocket-codex" \
                   "$deb/usr/share/applications" "$deb/usr/share/icons/hicolor/256x256/apps"
          cp -r "$bundle"/* "$deb/usr/lib/pocket-codex/"
          ln -s /usr/lib/pocket-codex/pocket_codex "$deb/usr/bin/pocket-codex"
          cp icon/icon_square.png "$deb/usr/share/icons/hicolor/256x256/apps/pocket-codex.png"
          cat > "$deb/usr/share/applications/pocket-codex.desktop" <<'DESKTOP'
          [Desktop Entry]
          Name=Pocket-Codex
          Comment=Remote-control codex sessions from any device
          Exec=/usr/lib/pocket-codex/pocket_codex
          Icon=pocket-codex
          Terminal=false
          Type=Application
          Categories=Development;Utility;
          DESKTOP
          cat > "$deb/DEBIAN/control" <<CONTROL
          Package: pocket-codex
          Version: ${debver}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Pocket-Codex Contributors <noreply@github.com>
          Depends: libgtk-3-0
          Description: Pocket-Codex desktop app
           Remote-control your codex sessions from any device.
          CONTROL
          dpkg-deb --build --root-owner-group "$deb" \
            "dist/pocket-codex-app-${tag}-linux-amd64.deb"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.RELEASE_NAME }}
          draft: ${{ env.IS_DRAFT }}
          body_path: release_notes.md
          files: apps/flutter/dist/*

  # --- App: macOS (DMG + portable zip) ----------------------------------------
  app-macos:
    name: App (macOS)
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: release-notes
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: app-macos
      - name: Install appdmg
        run: npm install -g appdmg
      - name: Activate desktop manifest (bundle Noto Sans SC)
        shell: bash
        working-directory: apps/flutter
        run: cp pubspec-desktop.yaml pubspec.yaml
      - name: Build macOS app
        working-directory: apps/flutter
        run: |
          flutter pub get
          flutter build macos --release
      - name: Package (zip + dmg)
        shell: bash
        working-directory: apps/flutter
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME//\//-}"
          rel="build/macos/Build/Products/Release"
          mkdir -p dist
          # Portable zip
          ( cd "$rel" && zip -qry "${OLDPWD}/dist/pocket-codex-app-${tag}-macos.zip" pocket_codex.app )
          # DMG (headless-friendly via appdmg)
          cat > "$rel/appdmg.json" <<JSON
          {
            "title": "Pocket-Codex",
            "icon": "pocket_codex.app/Contents/Resources/AppIcon.icns",
            "contents": [
              { "x": 448, "y": 188, "type": "link", "path": "/Applications" },
              { "x": 192, "y": 188, "type": "file", "path": "pocket_codex.app" }
            ]
          }
          JSON
          ( cd "$rel" && appdmg appdmg.json "${OLDPWD}/dist/pocket-codex-app-${tag}-macos.dmg" )
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.RELEASE_NAME }}
          draft: ${{ env.IS_DRAFT }}
          body_path: release_notes.md
          files: apps/flutter/dist/*

  # --- App: Android (split per ABI) -------------------------------------------
  app-android:
    name: App (Android)
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: release-notes
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          link-to-sdk: true
      - uses: Swatinem/rust-cache@v2
        with:
          key: app-android
      - name: Build Android APKs (split per ABI)
        working-directory: apps/flutter
        run: |
          flutter pub get
          flutter build apk --release --split-per-abi
      - name: Package
        shell: bash
        working-directory: apps/flutter
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME//\//-}"
          mkdir -p dist
          src="build/app/outputs/flutter-apk"
          cp "$src/app-arm64-v8a-release.apk"   "dist/pocket-codex-app-${tag}-android-arm64-v8a.apk"
          cp "$src/app-armeabi-v7a-release.apk" "dist/pocket-codex-app-${tag}-android-armeabi-v7a.apk"
          cp "$src/app-x86_64-release.apk"      "dist/pocket-codex-app-${tag}-android-x86_64.apk"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.RELEASE_NAME }}
          draft: ${{ env.IS_DRAFT }}
          body_path: release_notes.md
          files: apps/flutter/dist/*

  # --- App: iOS (unsigned, for sideloading / dev) -----------------------------
  app-ios:
    name: App (iOS, unsigned)
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: release-notes
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: app-ios
      - name: Build iOS app (no codesign)
        working-directory: apps/flutter
        run: |
          flutter pub get
          flutter build ios --release --no-codesign
      - name: Package unsigned IPA
        shell: bash
        working-directory: apps/flutter
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME//\//-}"
          mkdir -p dist
          ( cd build/ios/iphoneos && mkdir -p Payload && mv Runner.app Payload/ \
            && zip -qry "${OLDPWD}/dist/pocket-codex-app-${tag}-ios-unsigned.ipa" Payload )
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.RELEASE_NAME }}
          draft: ${{ env.IS_DRAFT }}
          body_path: release_notes.md
          files: apps/flutter/dist/*
