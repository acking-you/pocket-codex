name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Pinned Flutter version. Keep in sync with `apps/flutter/.fvmrc`
  # and `apps/flutter/pubspec.yaml`'s `environment.flutter` field.
  FLUTTER_VERSION: 3.44.0

jobs:
  fmt:
    name: rust fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust (nightly for rustfmt)
        # Pin to the same nightly the project's `rust-toolchain.toml`
        # uses so cargo-fmt's enumeration logic (which can change
        # between nightly builds) and rustfmt itself stay
        # bit-for-bit identical to local.
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-01
          components: rustfmt

      - name: cargo fmt --check
        # Restrict to first-party crates so we don't accidentally fmt
        # the path-dep tree (deps/uni-stream, deps/kanal, etc.).
        run: |
          cargo fmt --check \
            -p pocket-codex-core \
            -p pocket-codex-codex \
            -p pocket-codex-pb \
            -p pocket-codex-cli \
            -p pocket_codex_bridge

  clippy:
    name: rust clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run clippy on the workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: rust test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run workspace tests
        run: cargo test --workspace --locked

  flutter:
    name: flutter analyze + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: flutter pub get
        working-directory: apps/flutter
        run: flutter pub get

      - name: dart format --output=none --set-exit-if-changed
        working-directory: apps/flutter
        # Restrict to hand-written sources; the FRB-generated tree
        # follows its own formatting and is regenerated, not edited.
        run: dart format --output=none --set-exit-if-changed lib/main.dart test integration_test

      - name: flutter analyze
        working-directory: apps/flutter
        run: flutter analyze

      - name: flutter test
        working-directory: apps/flutter
        run: flutter test
