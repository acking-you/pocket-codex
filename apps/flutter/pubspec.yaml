name: pocket_codex
description: "Pocket-Codex Flutter front-end. Drives codex app-server through flutter_rust_bridge."
publish_to: 'none'

version: 0.1.0+1

# Flutter SDK is locked at the project level via FVM (`.fvmrc`) and at
# the language level via `environment.flutter`. CI uses
# `subosito/flutter-action@v2` with the same version pin. Whenever
# you bump Flutter, update all three sites in lockstep.
environment:
  sdk: ^3.12.0
  flutter: "3.44.0"

dependencies:
  flutter:
    sdk: flutter
  # gen-l10n localization (ARB-driven). intl's version is pinned by the
  # Flutter SDK; leave it unconstrained so `pub get` resolves the match.
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  # flutter_rust_bridge is wired up by `flutter_rust_bridge_codegen
  # integrate`. The version constraint here is what `pub get` checks
  # against; the codegen tool picks a matching binary.
  flutter_rust_bridge: 2.12.0
  pocket_codex_bridge:
    path: rust_builder
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  path_provider: ^2.1.5
  # Renders agent replies as Markdown documents (headings, code, lists,
  # tables) instead of plain chat bubbles. Maintained drop-in for the
  # discontinued flutter_markdown (same `MarkdownBody` API).
  flutter_markdown_plus: ^1.0.3
  # Opens URLs in the system browser (tapped links in agent replies / tool
  # output / plain text). url_launcher_windows is bundled and auto-registered.
  url_launcher: ^6.3.1
  # Linkifies bare URLs in plain-text widgets (user bubbles, tool/command
  # output, reasoning) — markdown links are handled by MarkdownBody itself.
  flutter_linkify: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  generate: true
  # Only the transparent brand mark ships in the bundle. logo.png and
  # poster.png stay in the repo as icon-generator input / marketing
  # material — bundling them would add ~2.7 MB of dead weight.
  assets:
    - assets/logo/mark.png

flutter_launcher_icons:
  # icon_square.png: edge-to-edge brand plate (#F5F3FE) + glyph, for
  # platforms that mask their own corners (iOS / legacy Android / web).
  # icon_rounded.png: rounded plate with transparent corners, for
  # platforms that show the icon as-is (Windows taskbar, macOS Dock).
  # Both are composed from icon/adaptive_foreground.png — see
  # docs in the icon/ directory siblings.
  image_path: "icon/icon_square.png"
  # iOS: Apple rejects alpha, so icons stay opaque (icon_square is).
  ios: true
  remove_alpha_ios: true
  # Android: legacy square mipmaps from image_path (pre-API-26) PLUS an
  # adaptive icon (API 26+) = lavender plate background + transparent
  # glyph foreground, so it integrates with the launcher's round/squircle
  # mask instead of showing a white-plate "sticker". The foreground PNG
  # already bakes a 62% safe-zone margin, so inset is 0 (no double-pad).
  android: true
  min_sdk_android: 21
  adaptive_icon_background: "#F5F3FE"
  adaptive_icon_foreground: "icon/adaptive_foreground.png"
  adaptive_icon_foreground_inset: 0
  # Web: PWA icons + manifest colours (replaces the stock Flutter favicon).
  web:
    generate: true
    image_path: "icon/icon_square.png"
    background_color: "#F5F3FE"
    theme_color: "#4C8DF6"
  # Windows: emits runner/resources/app_icon.ico (window + taskbar).
  # Bare glyph, no plate: taskbar icons render at 16-32 px, and a
  # plate would shrink the recognisable shape to half that.
  windows:
    generate: true
    image_path: "icon/icon_glyph.png"
    icon_size: 256
  # macOS: generates the Runner AppIcon.appiconset. Same rounded plate;
  # the Dock does not mask square icons either.
  macos:
    generate: true
    image_path: "icon/icon_rounded.png"

# The splash mark is the transparent glyph: logo.png is opaque, which
# showed up as a white box on the dark splash background.
flutter_native_splash:
  image: assets/logo/mark.png
  color: "#FFFFFF"
  color_dark: "#101316"
  android_12:
    image: assets/logo/mark.png
    color: "#FFFFFF"
    color_dark: "#101316"
