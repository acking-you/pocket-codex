name: pocket_codex
description: "Pocket-Codex Flutter front-end. Drives codex app-server through flutter_rust_bridge."
publish_to: 'none'

version: 0.0.1+1

# Flutter SDK is locked at the project level via FVM (`.fvmrc`) and at
# the language level via `environment.flutter`. CI uses
# `subosito/flutter-action@v2` with the same version pin. Whenever
# you bump Flutter, update all three sites in lockstep.
environment:
  sdk: ^3.12.0
  flutter: "3.44.0"

dependencies:
  flutter:
    sdk: flutter
  # gen-l10n localization (ARB-driven). intl's version is pinned by the
  # Flutter SDK; leave it unconstrained so `pub get` resolves the match.
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  # flutter_rust_bridge is wired up by `flutter_rust_bridge_codegen
  # integrate`. The version constraint here is what `pub get` checks
  # against; the codegen tool picks a matching binary.
  flutter_rust_bridge: 2.12.0
  pocket_codex_bridge:
    path: rust_builder
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  path_provider: ^2.1.5
  # Renders agent replies as Markdown documents (headings, code, lists,
  # tables) instead of plain chat bubbles. Maintained drop-in for the
  # discontinued flutter_markdown (same `MarkdownBody` API).
  flutter_markdown_plus: ^1.0.3
  # Opens URLs in the system browser (tapped links in agent replies / tool
  # output / plain text). url_launcher_windows is bundled and auto-registered.
  url_launcher: ^6.3.1
  # Linkifies bare URLs in plain-text widgets (user bubbles, tool/command
  # output, reasoning) — markdown links are handled by MarkdownBody itself.
  flutter_linkify: ^6.0.0
  # Variable-height-aware lazy list. The conversation mixes very short message
  # bubbles with tall command/code/output/grouped-activity cards; a plain
  # ListView.builder estimates total scroll extent from a running average of
  # laid-out children, so the scrollbar thumb jumps as differently sized rows
  # enter/leave the viewport during a drag (and as agent text streams in).
  # SuperListView estimates per-item extents and reconciles them against the
  # real height as rows scroll through the cache area, giving a stable thumb
  # while keeping lazy virtualization. Pure-Dart, MIT, all platforms. Pinned —
  # the package is in low-maintenance mode (no release since 2024); pin guards
  # against a future-Flutter break and avoids relying on the (buggy on desktop)
  # animateToItem/ListController path — we keep the existing ScrollController.
  super_sliver_list: 0.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  generate: true
  # Only the transparent brand mark ships in the bundle. logo.png and
  # poster.png stay in the repo as icon-generator input / marketing
  # material — bundling them would add ~2.7 MB of dead weight.
  assets:
    - assets/logo/mark.png

flutter_launcher_icons:
  # 方案 A "pocket is the hero": the brand mark (icon_glyph.png — the pocket
  # itself, already a container shape) IS the icon, on a clean white surface
  # rather than a muddy lavender plate that read as a weak outer ring.
  # icon_glyph.png is transparent, so it doubles as the adaptive foreground.
  image_path: "icon/icon_glyph.png"
  # iOS: Apple rejects alpha; remove_alpha flattens the transparent pocket
  # onto white (background_color_ios default) — a big pocket on white.
  ios: true
  remove_alpha_ios: true
  # Android: legacy square mipmaps from image_path (big pocket — old launchers
  # don't mask) PLUS an adaptive icon (API 26+). The adaptive FOREGROUND must
  # stay inside the ~61% safe zone or a circle-mask launcher clips the pocket's
  # phone-peek / stitching, so it keeps the safe-sized pocket
  # (adaptive_foreground.png) — but now on a CLEAN WHITE background instead of
  # the muddy lavender, so the pocket pops and there's no weak outer ring.
  android: true
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "icon/adaptive_foreground.png"
  adaptive_icon_foreground_inset: 0
  # Web: PWA icons + manifest colours (replaces the stock Flutter favicon).
  web:
    generate: true
    image_path: "icon/icon_glyph.png"
    background_color: "#FFFFFF"
    theme_color: "#7C5CF6"
  # Windows: emits runner/resources/app_icon.ico (window + taskbar).
  # Bare pocket, no plate: taskbar icons render at 16-32 px, and a plate
  # would shrink the recognisable shape to half that.
  windows:
    generate: true
    image_path: "icon/icon_glyph.png"
    icon_size: 256
  # macOS: the Dock shows the icon as-is (no mask), so the bare transparent
  # pocket floats plate-free — the cleanest expression of 方案 A.
  macos:
    generate: true
    image_path: "icon/icon_glyph.png"

# The splash mark is the transparent glyph: logo.png is opaque, which
# showed up as a white box on the dark splash background.
flutter_native_splash:
  image: assets/logo/mark.png
  color: "#FFFFFF"
  color_dark: "#101316"
  android_12:
    image: assets/logo/mark.png
    color: "#FFFFFF"
    color_dark: "#101316"
